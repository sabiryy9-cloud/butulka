<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butulka OK - Full Versiya</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #121212; color: white; font-family: Arial, sans-serif; margin: 0; overflow: hidden; }
        .header { background: #ee8208; padding: 10px; text-align: center; font-weight: bold; font-size: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Oyun Sahəsi */
        .game-container { position: relative; width: 100vw; height: 80vh; display: flex; justify-content: center; align-items: center; }
        
        /* Masa və Oyunçular */
        .table-wrapper { position: relative; width: 350px; height: 350px; border-radius: 50%; background: radial-gradient(#4d3319, #261a0d); border: 8px solid #5d4037; box-shadow: 0 0 50px #000; }
        
        /* Profil Dairələri (Masa ətrafı) */
        .player-spot { position: absolute; width: 60px; height: 60px; background: #333; border: 3px solid #ee8208; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; overflow: hidden; z-index: 2; }
        /* Oyunçuların yerləşməsi */
        .p1 { top: -20px; left: 145px; } .p2 { top: 30px; right: -20px; } .p3 { bottom: 30px; right: -20px; } .p4 { bottom: -20px; left: 145px; }
        .p5 { bottom: 30px; left: -20px; } .p6 { top: 30px; left: -20px; } .p7 { top: 100px; right: -40px; } .p8 { top: 100px; left: -40px; }

        /* Butulka */
        #bottle { position: absolute; top: 85px; left: 152px; width: 45px; height: 180px; background: url('https://pngimg.com/uploads/bottle/bottle_PNG2095.png') center/contain no-repeat; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); z-index: 5; }

        /* Statistika Paneli */
        .side-panel { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border-left: 5px solid #ee8208; width: 150px; }
        .stat-line { margin: 5px 0; font-size: 14px; color: #f1c40f; }

        /* Reytinq */
        .rank-panel { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; width: 150px; font-size: 12px; }
        .rank-title { border-bottom: 1px solid #ee8208; margin-bottom: 5px; color: #ee8208; text-align: center; }

        /* Hədiyyələr Alt Panel */
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: rgba(30,30,30,0.9); padding: 10px; display: flex; justify-content: center; gap: 15px; border-top: 2px solid #ee8208; }
        .gift-box { text-align: center; cursor: pointer; transition: 0.3s; }
        .gift-box:hover { transform: scale(1.2); }
        .gift-icon { font-size: 24px; background: #444; padding: 10px; border-radius: 10px; }
        .gift-price { font-size: 10px; color: #ee8208; margin-top: 3px; }

        .btn-spin { position: absolute; bottom: 100px; background: linear-gradient(#ff9f43, #ee5253); border: none; color: white; padding: 15px 40px; border-radius: 30px; font-weight: bold; font-size: 18px; cursor: pointer; box-shadow: 0 5px 0 #b33939; }
        
        /* Öpüş Efekti */
        #kiss-anim { position: absolute; font-size: 100px; display: none; z-index: 100; animation: kissScale 1s ease-out; }
        @keyframes kissScale { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">ODNOKLASSNIKI BUTULKA 🍾</div>

    <div id="loginScreen" style="text-align: center; margin-top: 100px;">
        <input type="text" id="nick" placeholder="Adınız..." style="padding:15px; border-radius:10px;"><br><br>
        <button class="btn-spin" style="position:static" onclick="login()">OYUNA GİR</button>
    </div>

    <div id="gameScreen" style="display:none">
        <div class="side-panel">
            <div class="stat-line">👤 <span id="myName">...</span></div>
            <div class="stat-line">💋 Öpüş: <span id="myKisses">0</span></div>
            <div class="stat-line">💎 Bonus: <span id="myBonus">0</span></div>
        </div>

        <div class="rank-panel">
            <div class="rank-title">🏆 TOP REYTİNQ</div>
            <div id="rankList"></div>
        </div>

        <div class="game-container">
            <div id="kiss-anim">💋</div>
            <div class="table-wrapper">
                <div class="player-spot p1">Boş</div>
                <div class="player-spot p2">Boş</div>
                <div class="player-spot p3">Boş</div>
                <div class="player-spot p4">Boş</div>
                <div class="player-spot p5">Boş</div>
                <div class="player-spot p6">Boş</div>
                <div class="player-spot p7">Boş</div>
                <div class="player-spot p8">Sən</div>
                <div id="bottle"></div>
            </div>
            <button class="btn-spin" onclick="requestSpin()">BUTULKANI FIRLAT</button>
        </div>

        <div class="bottom-bar">
            <div class="gift-box" onclick="sendGift('🌹', 10)"><div class="gift-icon">🌹</div><div class="gift-price">10</div></div>
            <div class="gift-box" onclick="sendGift('❤️', 50)"><div class="gift-icon">❤️</div><div class="gift-price">50</div></div>
            <div class="gift-box" onclick="sendGift('🏎️', 200)"><div class="gift-icon">🏎️</div><div class="gift-price">200</div></div>
            <div class="gift-box" onclick="sendGift('👑', 500)"><div class="gift-icon">👑</div><div class="gift-price">500</div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9_vB4hMnL8CYHYIwSUjeeyX0LxwDx62M",
            databaseURL: "https://butulka-acc47-default-rtdb.firebaseio.com",
            projectId: "butulka-acc47",
            appId: "1:738231536356:web:1b6a5eb39d60fbae32faf1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let myNick = "";

        function login() {
            myNick = document.getElementById('nick').value.trim();
            if(myNick === "") return;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            document.getElementById('myName').innerText = myNick;
            
            db.ref('users/' + myNick).once('value', s => {
                if(!s.exists()) db.ref('users/' + myNick).set({kisses: 0, points: 100});
            });
            sync();
        }

        function sync() {
            db.ref('users/' + myNick).on('value', s => {
                document.getElementById('myKisses').innerText = s.val().kisses || 0;
                document.getElementById('myBonus').innerText = s.val().points || 0;
            });

            db.ref('rooms/global/rotation').on('value', s => {
                document.getElementById('bottle').style.transform = `rotate(${s.val()}deg)`;
            });

            db.ref('users').orderByChild('kisses').limitToLast(5).on('value', s => {
                let html = "";
                s.forEach(p => { html = `<div>${p.key}: ${p.val().kisses}</div>` + html; });
                document.getElementById('rankList').innerHTML = html;
            });
        }

        function requestSpin() {
            let rot = Math.floor(Math.random() * 360) + 3600;
            db.ref('rooms/global').update({ rotation: rot });
            
            // Öpüşü artır və animasiya göstər
            setTimeout(() => {
                db.ref('users/' + myNick + '/kisses').transaction(k => (k || 0) + 1);
                let anim = document.getElementById('kiss-anim');
                anim.style.display = 'block';
                setTimeout(() => anim.style.display = 'none', 1000);
            }, 4000);
        }

        function sendGift(e, c) {
            db.ref('users/' + myNick + '/points').transaction(p => (p >= c) ? p - c : p);
            alert(e + " göndərildi!");
        }
    </script>
</body>
</html>
