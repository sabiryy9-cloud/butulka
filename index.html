<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #1a1a1a; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .game-board { 
            width: 350px; height: 350px; 
            background: #a67c52; /* Orijinal masa rəngi */
            border: 15px solid #5d4037; 
            border-radius: 50%; 
            position: relative;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5);
        }
        .bottle {
            width: 50px; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1);
        }
        .spin-btn {
            position: absolute; bottom: 50px; padding: 15px 40px;
            background: #ff9800; color: white; border: none;
            border-radius: 25px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="game-board">
        <img src="https://i.imgur.com/vHqLh7S.png" class="bottle" id="bottle">
    </div>
    <button class="spin-btn" onclick="spin()">FIRLAT</button>

    <script>
        let deg = 0;
        function spin() {
            deg += Math.floor(Math.random() * 360) + 1800;
            document.getElementById('bottle').style.transform = `translate(-50%, -50%) rotate(${deg}deg)`;
        }
    </script>
</body>
</html>
