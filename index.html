<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Butulka Fırlat</title>
    <style>
        body { background: #121212; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .circle { width: 280px; height: 280px; border: 4px dashed #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; }
        .bottle { width: 45px; height: 160px; background: #27ae60; border-radius: 20px 20px 5px 5px; position: relative; transition: transform 3s cubic-bezier(0.1, 0, 0.1, 1); border: 2px solid #1e8449; }
        .bottle::after { content: ''; position: absolute; top: -12px; left: 10px; width: 20px; height: 12px; background: #1e8449; border-radius: 3px; }
        button { padding: 15px 40px; font-size: 18px; background: #e74c3c; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
    </style>
</head>
<body>
    <h1>Butulka Fırlat</h1>
    <div class="circle"><div id="bottle" class="bottle"></div></div>
    <button id="spinBtn" onclick="spin()">FIRLAT</button>
    <h2 id="msg">Kimin bəxtinə?</h2>
    <script>
        let rotation = 0;
        function spin() {
            const btn = document.getElementById('spinBtn');
            const bottle = document.getElementById('bottle');
            const msg = document.getElementById('msg');
            btn.disabled = true;
            msg.innerText = "Fırlanır...";
            let extra = Math.floor(Math.random() * 360) + 1800; 
            rotation += extra;
            bottle.style.transform = `rotate(${rotation}deg)`;
            setTimeout(() => { btn.disabled = false; msg.innerText = "Dayandı!"; }, 3000);
        }
    </script>
</body>
</html>
